<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Target Domain Gradient (Indigo -> Deep Purple) -->
    <linearGradient id="target-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    
    <!-- Source 1 Gradient (Cyan -> Blue) -->
    <linearGradient id="source1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    
    <!-- Source 2 Gradient (Blue -> Indigo) -->
    <linearGradient id="source2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    
    <!-- Source 3 Gradient (Violet -> Pink) -->
    <linearGradient id="source3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>

    <!-- Line Gradients to fade nicely -->
    <linearGradient id="line1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#4F46E5" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="line2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#4F46E5" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="line3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#4F46E5" stop-opacity="0.2"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <g transform="translate(20, 20)">
    <!-- Connection lines -->
    <path d="M 70 70 C 170 70, 180 180, 280 180" fill="none" stroke="url(#line1)" stroke-width="8" stroke-linecap="round" />
    <path d="M 70 180 C 170 180, 180 180, 280 180" fill="none" stroke="url(#line2)" stroke-width="8" stroke-linecap="round" />
    <path d="M 70 290 C 170 290, 180 180, 280 180" fill="none" stroke="url(#line3)" stroke-width="8" stroke-linecap="round" />

    <!-- Source Domains -->
    <circle cx="70" cy="70" r="32" fill="url(#source1)" filter="url(#shadow)"/>
    <circle cx="70" cy="180" r="32" fill="url(#source2)" filter="url(#shadow)"/>
    <circle cx="70" cy="290" r="32" fill="url(#source3)" filter="url(#shadow)"/>

    <!-- Source Domain Centers -->
    <circle cx="70" cy="70" r="10" fill="#FFFFFF"/>
    <circle cx="70" cy="180" r="10" fill="#FFFFFF"/>
    <circle cx="70" cy="290" r="10" fill="#FFFFFF"/>

    <!-- Target Domain -->
    <circle cx="280" cy="180" r="64" fill="url(#target-grad)" filter="url(#shadow)"/>
    
    <!-- Target Domain inner rings -->
    <circle cx="280" cy="180" r="36" fill="#FFFFFF" opacity="0.15"/>
    <circle cx="280" cy="180" r="16" fill="#FFFFFF"/>
    
    <!-- Orbital Nodes (Representing Data Transfer) -->
    <circle cx="240" cy="130" r="6" fill="#06B6D4" filter="url(#shadow)"/>
    <circle cx="330" cy="220" r="8" fill="#EC4899" filter="url(#shadow)"/>
    <circle cx="310" cy="125" r="5" fill="#3B82F6" filter="url(#shadow)"/>
  </g>
</svg>